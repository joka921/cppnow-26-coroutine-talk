name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: |
          mkdir -p _site/node_modules/reveal.js
          cp index.html _site/
          cp -r css/ _site/
          cp *.svg *.png *.jpg _site/ 2>/dev/null || true
          cp slides.pdf _site/ 2>/dev/null || true
          cp -r node_modules/reveal.js/dist  _site/node_modules/reveal.js/
          cp -r node_modules/reveal.js/plugin _site/node_modules/reveal.js/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
